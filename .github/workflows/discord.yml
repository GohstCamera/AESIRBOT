name: Discord Commit Notifications

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send commit details to Discord
        run: |
          COMMIT_MESSAGE="${{ github.event.head_commit.message }}"
          COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_URL="${{ github.event.head_commit.url }}"
          COMMIT_ID="${{ github.event.head_commit.id }}"
          COMMIT_FILES=$(echo "${{ github.event.head_commit.added }} ${{ github.event.head_commit.modified }} ${{ github.event.head_commit.removed }}" | tr -d '[],"')

          PAYLOAD=$(jq -n \
            --arg msg "$COMMIT_MESSAGE" \
            --arg author "$COMMIT_AUTHOR" \
            --arg url "$COMMIT_URL" \
            --arg id "$COMMIT_ID" \
            --arg files "$COMMIT_FILES" \
            '{
              "content": "<@203250636924518400> <@743155509691023431>🚀 Nouveau push détecté sur main",
              "embeds": [{
                "title": "📢 Commit détecté",
                "url": $url,
                "description": $msg,
                "fields": [
                  {"name": "Auteur", "value": $author, "inline": true},
                  {"name": "Commit ID", "value": $id, "inline": true},
                  {"name": "Fichiers modifiés", "value": ($files | if . == "" then "Aucun" else . end)}
                ],
                "color": 3447003
              }]
            }')

          echo "$PAYLOAD"

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$PAYLOAD" \
               ${{ secrets.DISCORD_WEBHOOK }}
